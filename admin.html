<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaulmt - Admin License Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --surface-dark: #1e1e1e;
            --primary: #8b5cf6;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .card {
            background-color: var(--surface-dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
        }
        .form-control, .form-select {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(255,255,255,0.1);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25);
        }
        .form-control::placeholder { color: var(--text-muted); }
        .table {
            color: var(--text-main);
            border-color: rgba(255,255,255,0.1);
        }
        .table th { border-bottom: 2px solid rgba(255,255,255,0.1); color: var(--text-muted); font-weight: 500;}
        .table td { border-color: rgba(255,255,255,0.1); vertical-align: middle; }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background-color: #7c3aed;
            border-color: #7c3aed;
        }
        .badge-active { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-expired { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-revoked { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
        }
        .modal-content {
            background-color: var(--surface-dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
    </style>
</head>
<body>

    <!-- Màn hình Đăng nhập -->
    <div id="login-screen">
        <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <h3 style="color: var(--primary); font-weight: bold;">Gaulmt Admin</h3>
                <p class="text-muted">Quản lý License Server Vercel</p>
            </div>
            <div class="mb-3">
                <label class="form-label">Vercel URL (API Endpoint)</label>
                <input type="text" id="api-url" class="form-control" value="https://tool-tele.vercel.app" placeholder="https://...">
            </div>
            <div class="mb-4">
                <label class="form-label">Admin Secret Key</label>
                <input type="password" id="admin-key" class="form-control" placeholder="Nhập admin key..." value="GAULMT_ADMIN_2026_SECRET">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Đăng Nhập</button>
            <div id="login-error" class="text-danger mt-3 text-center" style="display: none;"></div>
        </div>
    </div>

    <!-- Màn hình Quản trị -->
    <div id="dashboard-screen" style="display: none;">
        <nav class="navbar navbar-dark mb-4" style="background-color: var(--surface-dark); border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div class="container-fluid px-4">
                <span class="navbar-brand mb-0 h1" style="color: var(--primary); font-weight: bold;">Gaulmt License Manager</span>
                <div>
                    <span id="nav-url" class="text-muted me-3 fs-7"></span>
                    <button class="btn btn-sm btn-outline-danger" onclick="logout()">Đăng xuất</button>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <!-- Thống kê -->
            <div class="row mb-4">
                <div class="col-md-3"><div class="card p-3 text-center"><h5>Tổng Key</h5><h2 id="stat-total">0</h2></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h5>Đang Kích Hoạt</h5><h2 id="stat-active" class="text-success">0</h2></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h5>Chờ Kích Hoạt</h5><h2 id="stat-pending" class="text-warning">0</h2></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h5>Thu Hồi/Hết Hạn</h5><h2 id="stat-expired" class="text-danger">0</h2></div></div>
            </div>

            <!-- Toolbar -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Danh sách Bản quyền</h4>
                <div>
                    <button class="btn btn-success me-2" onclick="refreshData()">🔄 Bấm để Load lại</button>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">➕ Tạo Key Mới</button>
                </div>
            </div>

            <!-- Bảng dữ liệu -->
            <div class="card p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead style="background: rgba(0,0,0,0.2);">
                            <tr>
                                <th>License Key</th>
                                <th>Người dùng (Ghi chú)</th>
                                <th>Thời hạn</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="license-table-body">
                            <tr><td colspan="5" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Tạo Key -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tạo License Key Mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tên/Ghi chú khách hàng</label>
                        <input type="text" id="create-user" class="form-control" placeholder="Ví dụ: Khách VIP A">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Thời hạn (Tháng)</label>
                        <select id="create-months" class="form-select">
                            <option value="1">1 Tháng</option>
                            <option value="3">3 Tháng</option>
                            <option value="6">6 Tháng</option>
                            <option value="12">1 Năm (12 Tháng)</option>
                            <option value="999">Vĩnh viễn</option>
                        </select>
                    </div>
                    <div id="create-error" class="text-danger mt-2" style="display: none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="createKey()" id="btn-submit-create">Tạo mới</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let config = { url: '', key: '' };

        async function apiCall(endpoint, data = {}) {
            data.admin_key = config.key;
            try {
                const res = await fetch(`${config.url}/admin${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await res.json();
            } catch (e) {
                return { success: false, message: e.message };
            }
        }

        async function login() {
            const url = document.getElementById('api-url').value.replace(/\/$/, '');
            const key = document.getElementById('admin-key').value;
            const errEl = document.getElementById('login-error');
            
            if (!url || !key) {
                errEl.textContent = "Vui lòng nhập đủ thông tin";
                errEl.style.display = 'block';
                return;
            }

            config.url = url;
            config.key = key;

            // Test credentials
            const res = await apiCall('/stats');
            if (res.success) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                document.getElementById('nav-url').textContent = url;
                loadDashboardData();
            } else {
                errEl.textContent = res.message || "Kết nối thất bại hoặc Admin Key sai!";
                errEl.style.display = 'block';
            }
        }

        function logout() {
            config = { url: '', key: '' };
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dashboard-screen').style.display = 'none';
        }

        function refreshData() {
            document.getElementById('license-table-body').innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Đang làm mới dữ liệu...</td></tr>';
            loadDashboardData();
        }

        async function loadDashboardData() {
            const stats = await apiCall('/stats');
            if (stats.success) {
                document.getElementById('stat-total').textContent = stats.stats.total;
                document.getElementById('stat-active').textContent = stats.stats.active;
                document.getElementById('stat-pending').textContent = stats.stats.pending;
                document.getElementById('stat-expired').textContent = stats.stats.expired + stats.stats.revoked;
            }

            const listRes = await apiCall('/list');
            const tbody = document.getElementById('license-table-body');
            tbody.innerHTML = '';

            if (listRes.success && listRes.licenses) {
                if (listRes.licenses.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Chưa có License nào trong hệ thống.</td></tr>';
                }

                // Sort by creation date or just loop
                listRes.licenses.forEach(lic => {
                    let statusBadge = '';
                    if (lic.status === 'revoked') {
                        statusBadge = '<span class="badge badge-revoked">Bị thu hồi</span>';
                    } else if (lic.days_left < 0) {
                        statusBadge = '<span class="badge badge-expired">Hết hạn</span>';
                    } else if (lic.hardware_id === 'Chưa kích hoạt') {
                        statusBadge = '<span class="badge bg-warning text-dark">Chờ kích hoạt</span>';
                    } else {
                        statusBadge = '<span class="badge badge-active">Đang hoạt động</span>';
                    }

                    const subtext = lic.user_id !== lic.notes && lic.notes ? lic.notes : 'Tool Telegram';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <code class="text-primary bg-dark px-2 py-1 rounded" style="font-size: 14px;">${lic.license_key}</code>
                                <button class="btn btn-sm btn-outline-secondary py-0 px-1" title="Copy" onclick="navigator.clipboard.writeText('${lic.license_key}')">📋</button>
                            </div>
                        </td>
                        <td>
                            <div class="fw-bold">${lic.user_id}</div>
                            <small class="text-muted">${subtext}</small>
                        </td>
                        <td>
                            <div>${lic.expire_date}</div>
                            <small class="${lic.days_left > 0 ? 'text-success' : 'text-danger'}">${lic.days_left > 0 ? `Còn ${lic.days_left} ngày` : 'Đã hết hạn'}</small>
                        </td>
                        <td>${statusBadge}</td>
                        <td>
                            ${lic.status !== 'revoked' ? 
                                `<button class="btn btn-sm btn-outline-danger" onclick="revokeKey('${lic.license_key}')">Thu hồi mã</button>` : 
                                `<button class="btn btn-sm btn-secondary disabled">Đã thu hồi</button>`
                            }
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Lỗi: ${listRes.message}</td></tr>`;
            }
        }

        async function createKey() {
            const user = document.getElementById('create-user').value.trim();
            const months = document.getElementById('create-months').value;
            const errEl = document.getElementById('create-error');
            const btn = document.getElementById('btn-submit-create');

            if (!user) {
                errEl.textContent = "Vui lòng nhập tên người dùng!";
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = "Đang tạo...";
            errEl.style.display = 'none';

            const res = await apiCall('/create', { user_id: user, months: parseInt(months), notes: user });
            
            btn.disabled = false;
            btn.textContent = "Tạo mới";

            if (res.success) {
                const modal = bootstrap.Modal.getInstance(document.getElementById('createModal'));
                modal.hide();
                document.getElementById('create-user').value = '';
                refreshData();
                
                // Show prompt with key
                setTimeout(() => {
                    prompt("Đã tạo Key thành công! Vui lòng copy gửi cho khách:", res.license_key);
                }, 500);
            } else {
                errEl.textContent = res.message || "Lỗi tạo key!";
                errEl.style.display = 'block';
            }
        }

        async function revokeKey(key) {
            if (confirm(`Bạn có CHẮC CHẮN muốn thu hồi key:\n${key}\n\nMáy khách đang chạy sẽ bị văng ra màn hình nhập license sau tối đa 1h.`)) {
                const res = await apiCall('/revoke', { license_key: key });
                if (res.success) {
                    alert('Thu hồi key thành công!');
                    refreshData();
                } else {
                    alert(`Lỗi: ${res.message}`);
                }
            }
        }
    </script>
</body>
</html>
